      var opacity = p.restOpacity + w * (1 - p.restOpacity);
      var px = ox + d.x * side;
      var py = oy + d.y * side;
      var r = radius * d.s * scale;

      var cr, cg, cb;
      if (p.sampleFromSource && d.c) {
        var b = 1 + w * 0.6;
        cr = Math.min(255, d.c[0] * b) | 0;
        cg = Math.min(255, d.c[1] * b) | 0;
        cb = Math.min(255, d.c[2] * b) | 0;
      } else {
        cr = baseR; cg = baseG; cb = baseB;
      }
      ctx.fillStyle = "rgba(" + cr + "," + cg + "," + cb + "," + opacity + ")";

      if (p.dotShape === "square") {
        ctx.fillRect(px - r, py - r, r * 2, r * 2);
      } else {
        ctx.beginPath();
        ctx.arc(px, py, r, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
